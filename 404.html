<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página não encontrada — Maleval Traduções</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#0e1422" />
<style>
  :root{--navy:#0e1422;--gold:#c9a24a;--text:#e8e6e1;--muted:#9aa3b2}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--navy);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{max-width:640px;text-align:center}
  .code{font-size:5rem;font-weight:700;color:var(--gold);font-family:Georgia,serif;line-height:1}
  h1{font-size:1.6rem;margin:16px 0 10px}
  p{color:var(--muted);margin-bottom:26px;line-height:1.6}
  .links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:26px}
  .links a{display:inline-block;padding:12px 22px;border:1px solid rgba(201,162,74,.45);border-radius:8px;color:var(--text);text-decoration:none;transition:.2s}
  .links a:hover{border-color:var(--gold);color:var(--gold)}
  .links a.primary{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
  .lang{font-size:.85rem;color:var(--muted)}
  .lang a{color:var(--muted);text-decoration:underline;margin:0 6px}
  .lang a:hover{color:var(--gold)}
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido. Aqui estão os melhores caminhos:</p>
    <div class="links">
      <a class="primary" href="/">Página inicial</a>
      <a href="/blog/">Blog</a>
      <a href="/portfolio/">Portfólio</a>
      <a href="/#contato">Fale comigo</a>
    </div>
    <p class="lang">
      Page not found — <a href="/index-en.html">English</a> ·
      Página no encontrada — <a href="/index-es.html">Español</a> ·
      Page introuvable — <a href="/index-fr.html">Français</a>
    </p>
  </div>
</body>
</html>
